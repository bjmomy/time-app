<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>시간 관리 앱 v9.2</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff"> 

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <style>
        html, body {
            height: 100vh; height: 100dvh; margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9; font-size: 14px;
        }
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .hidden { display: none !important; }

        /* --- 헤더 --- */
        #date-header {
            flex-shrink: 0; padding: 10px; background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0; display: flex;
            justify-content: space-between; align-items: center;
        }
        #date-controls-left, #center-controls, #search-controls-right {
            display: flex;
            align-items: center;
        }
        #date-header button {
            background: none; border: none; font-size: 20px; font-weight: bold;
            color: #007aff; cursor: pointer; padding: 0 10px;
        }
        #current-date {
            min-width: 120px; text-align: center; font-size: 18px;
            font-weight: 600; color: #333;
        }
        #calendar-btn, #memo-btn, #today-btn { 
            font-size: 24px; padding: 0 5px; 
        }
        #center-controls button { font-size: 24px; padding: 0 8px; }
        #search-controls-right { justify-content: flex-end; }
        #save-all-btn, #playground-btn, #settings-btn { font-size: 24px; padding: 0 8px; }
        #search-input {
            border: 1px solid #ccc; border-radius: 4px; padding: 6px 8px;
            font-size: 14px; max-width: 100px;
        }
        #search-btn { font-size: 22px; padding: 0 8px; }

        /* --- 공통 패널 컨테이너 --- */
        .main-container {
            display: flex; flex-grow: 1; width: 100%;
            background-color: #ffffff; overflow: hidden; min-height: 0;
        }
        .left-panel, .right-panel {
            flex: 1; padding: 10px; display: flex;
            flex-direction: column; min-width: 0;
        }
        .left-panel { border-right: 1px solid #e0e0e0; }
        .single-panel-view {
            padding: 10px; display: flex; flex-direction: column;
            flex-grow: 1; min-width: 100%; box-sizing: border-box;
        }

        h3 {
            margin-top: 0; margin-bottom: 8px; color: #333;
            padding-bottom: 4px;
            font-size: 16px; font-weight: 600; flex-shrink: 0;
        }
        .h3-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        .h3-wrapper h3 {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        #apply-routine-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #007aff;
            padding: 0;
        }
        #apply-routine-btn.active {
            color: #FF9500;
        }
        #apply-routine-btn:hover { opacity: 0.7; }

        /* --- 메모 컨테이너 --- */
        #memo-textarea {
            width: 100%; height: 100%; border: 1px solid #e0e0e0;
            border-radius: 4px; padding: 10px; font-size: 15px;
            font-family: inherit; box-sizing: border-box; resize: none;
            white-space: pre-wrap; word-wrap: break-word;
            overflow-y: auto;
            outline: none;
        }
        #memo-textarea:empty:before {
            content: attr(placeholder);
            color: #999;
        }
        #memo-textarea:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
        }

        /* --- 계획표: 할 일 섹션 --- */
        #todo-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 120px; /* 최소 높이 설정 (헤더+입력창 확보) */
            overflow: hidden; /* 내부 요소 넘침 방지 */
        }
        .input-section { display: flex; margin-bottom: 10px; flex-shrink: 0; gap: 5px; }
        .input-section input[type="text"],
        .input-section input[type="number"] {
            flex-grow: 1; border: 1px solid #ccc; border-radius: 4px;
            padding: 8px 10px; font-size: 14px;
            min-width: 0; /* flex container 내부 overflow 방지 */
        }
        .input-section button {
            background-color: #007aff; color: white; border: none; border-radius: 4px;
            padding: 8px 12px; cursor: pointer;
            font-size: 16px; font-weight: bold;
            flex-shrink: 0;
        }
        #todo-list { 
            list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1;
            min-height: 400px; /* 10줄 정도 디폴트로 보이게 설정 */
        }
        .task-item {
            padding: 8px 10px;
            border: none;
            border-bottom: 1px solid #f0f0f0;
            border-radius: 0;
            margin-bottom: 5px;
            font-size: 14px;
            display: flex;
            align-items: center;
            transition: opacity 0.3s;
        }
        .routine-item {
            background-color: #fdfdfd;
        }
        .routine-item span::before {
            content: "📌 ";
            font-size: 12px;
            opacity: 0.6;
        }
        
        /* 수정 가능하도록 outline 제거 */
        .task-item span { flex-grow: 1; cursor: pointer; margin-right: 5px; outline: none; }
        input[type="checkbox"] { margin-right: 8px; flex-shrink: 0; accent-color: #007aff; }
        .task-item.completed { opacity: 0.5; }
        .task-item.completed span { text-decoration: line-through; color: #888; }
        .task-item.is-important span { color: #d32f2f; font-weight: bold; }
        .delete-btn {
            background: none; border: none; color: #ff3b30; font-size: 22px;
            font-weight: 500; line-height: 1; cursor: pointer;
            padding: 0 2px 0 8px; margin-left: auto; flex-shrink: 0;
        }

        /* --- 계획표: 타임라인 --- */
        #timeline-wrapper { flex-grow: 1; overflow-y: auto; }
        #timeline { position: relative; }
        .time-slot {
            min-height: 24px;
            height: auto;
            border-bottom: 1px solid #e8e8e8;
            position: relative;
            padding-left: 42px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            padding-top: 2px;
            padding-bottom: 2px;
        }
        .time-slot.hour-start {
            border-top: 2px solid #d0d0d0;
            min-height: 26px;
        }
        .time-slot.hour-start:first-child { border-top: none; }
        .time-slot .time-label {
            position: absolute;
            left: 2px;
            top: 2px;
            font-size: 10px;
            color: #888;
            font-weight: 600;
        }
        .time-slot.hour-start .time-label { color: #555; font-size: 11px; }
        .time-slot.drag-over { background-color: #e0f7fa; }
        
        .dropped-task {
            display: inline-flex;
            align-items: center;
            padding: 1px 4px;
            font-size: 11px;
            margin: 1px 3px 1px 0;
            font-weight: 500;
            cursor: grab;
            background-color: #E3F2FD;
            border: 1px solid #BBDEFB;
            border-radius: 3px;
            line-height: 1.2;
        }
        .dropped-task:active { cursor: grabbing; }
        .dropped-task.is-important { 
            color: #d32f2f;
            background-color: #FFEBEE;
            border-color: #FFCDD2;
        }
        .dropped-task.is-general { 
            color: #333;
            background-color: #E3F2FD;
            border-color: #BBDEFB;
        }
        
        .timeline-delete-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            padding: 0 0 0 5px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .dropped-task:hover .timeline-delete-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .timeline-delete-btn:hover {
            color: #ff3b30;
        }


        /* --- 놀이터(Playground) 스타일 --- */
        #goal-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .goal-item {
            padding: 10px; border: 1px solid #eee; border-radius: 4px;
            margin-bottom: 5px; font-size: 15px; display: flex;
            align-items: center; cursor: pointer;
        }
        .goal-item:hover { background-color: #f9f9f9; }
        .goal-item.selected { background-color: #eef8ff; border-color: #007aff; }
        .goal-item span { flex-grow: 1; outline: none; }
        .goal-item.completed span { text-decoration: line-through; color: #888; opacity: 0.7; }
        #goal-progress-view { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
        #goal-progress-placeholder {
            flex-grow: 1; display: flex; align-items: center;
            justify-content: center; color: #aaa; font-size: 16px;
        }
        #goal-progress-content { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
        #goal-progress-notes {
            width: 100%; height: 150px; border: 1px solid #e0e0e0;
            border-radius: 4px; padding: 10px; font-size: 15px;
            font-family: inherit; box-sizing: border-box; resize: vertical;
            margin-bottom: 10px; flex-shrink: 0;
        }
        #goal-progress-notes:focus { border-color: #007aff; box-shadow: 0 0 0 2px rgba(0,122,255,0.2); }
        #goal-image-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; flex-shrink: 0;
        }
        #goal-image-controls label {
            background-color: #007aff; color: white; padding: 8px 12px;
            border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        #goal-image-controls input[type="file"] { display: none; }
        #export-goal-pdf-btn {
            background-color: #34c759; color: white; border: none;
            padding: 8px 12px; border-radius: 4px; font-size: 14px;
            font-weight: 600; cursor: pointer;
        }
        #goal-progress-images {
            flex-grow: 1; overflow-y: auto; border: 1px solid #eee;
            border-radius: 4px; padding: 5px; background: #fdfdfd;
        }
        .image-wrapper { position: relative; margin-bottom: 5px; line-height: 0; }
        .image-wrapper img {
            width: 100%; border-radius: 4px; cursor: pointer; transition: width 0.2s;
        }
        .image-wrapper img[data-size="100"] { width: 100%; }
        .image-wrapper img[data-size="75"] { width: 75%; }
        .image-wrapper img[data-size="50"] { width: 50%; }
        .image-controls {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5);
            border-radius: 4px; display: flex; opacity: 0; transition: opacity 0.2s;
        }
        .image-wrapper:hover .image-controls { opacity: 1; }
        .image-controls button {
            background: none; border: none; color: white; font-size: 18px;
            font-weight: bold; cursor: pointer; padding: 4px 8px;
        }
        .image-controls button:disabled { color: #888; cursor: not-allowed; }
        .image-controls button:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .pdf-render-div {
            width: 100%; font-size: 15px; font-family: inherit; padding: 10px;
            box-sizing: border-box; background: white; white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* --- 몸무게 기록 (시트 타입 스타일) --- */
        #weight-sheet-wrapper {
            flex-grow: 1; overflow-y: auto; border: 1px solid #e0e0e0;
            border-radius: 4px; margin-top: 10px; background-color: #fff;
        }
        .sheet-table {
            width: 100%; border-collapse: collapse; min-width: 300px;
        }
        .sheet-table th, .sheet-table td {
            border: 1px solid #ddd; padding: 0;
            text-align: center; font-size: 14px; vertical-align: middle;
        }
        .sheet-table th {
            padding: 10px 5px; background-color: #f8f8f8; color: #555;
            font-weight: 600; position: sticky; top: 0; z-index: 10;
        }
        .sheet-table td {
            height: 40px;
        }
        .sheet-table input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 14px; background: transparent; padding: 0 5px;
            box-sizing: border-box; font-family: inherit;
        }
        .sheet-table input:focus {
            background-color: #eef8ff; outline: 2px solid #007aff; outline-offset: -2px;
        }
        .sheet-table .date-cell {
            background-color: #fdfdfd; color: #555; font-size: 13px;
        }
        .sheet-delete-btn {
            background: none; border: none; color: #ccc; font-size: 20px;
            cursor: pointer; width: 100%; height: 100%;
        }
        .sheet-delete-btn:hover { color: #ff3b30; background-color: #fff0f0; }
        
        #import-weight-label {
            display: inline-block;
            background-color: #8e8e93;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            width: auto;
            line-height: 1.4;
        }
        #import-weight-label:hover { opacity: 0.8; }

        /* --- 그래프 --- */
        #graph-chart-wrapper {
            flex-grow: 1; position: relative; min-height: 0;
        }
        #weight-chart { max-width: 100%; }

        /* --- 책 리스트 스타일 --- */
        #book-list-wrapper {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            background-color: #fff;
        }
        .book-category {
            margin-bottom: 20px;
        }
        .book-category-title {
            font-size: 18px;
            font-weight: 700;
            color: #007aff;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #007aff;
        }
        .book-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }
        .book-item:hover {
            background-color: #f4f4f9;
        }
        .book-item:last-child {
            border-bottom: none;
        }
        .book-item-number {
            color: #888;
            font-size: 12px;
            margin-right: 10px;
            min-width: 30px;
        }
        .book-item-title {
            flex-grow: 1;
            font-size: 15px;
            color: #333;
        }
        .book-item-title.snu-book {
            color: #007aff;
            font-weight: 600;
        }
        .book-item.has-note::after {
            content: "📝";
            margin-left: 8px;
            font-size: 14px;
        }
        .book-item.completed .book-item-title {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .book-item.hidden {
            display: none;
        }
        .book-item-delete {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .book-item:hover .book-item-delete {
            opacity: 1;
        }

        /* --- 달력 --- */
        .flatpickr-day.day-has-data::after {
            content: "•"; color: #f59e0b; position: absolute;
            bottom: -2px; left: 50%; transform: translateX(-50%); font-size: 16px;
        }

        /* --- 공통 모달 스타일 --- */
        .modal-overlay {
            position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            background-color: #fefefe; border-radius: 8px; padding: 20px;
            border: 1px solid #888; width: 90%; max-width: 500px;
            max-height: 80vh; display: flex; flex-direction: column;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .modal-header h4 { margin: 0; font-size: 18px; }
        .modal-close-btn {
            font-size: 28px; font-weight: bold; color: #aaa;
            cursor: pointer; background: none; border: none; padding: 0;
        }
        
        /* --- 검색 모달 --- */
        #search-results-list { list-style: none; padding: 0; margin: 10px 0 0; overflow-y: auto; }
        .search-result-item {
            padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
        }
        .search-result-item:hover { background-color: #f4f4f9; }
        .search-result-item small { font-weight: 600; color: #007aff; display: block; }
        .search-result-item p { margin: 5px 0 0; color: #333; }
        
        /* --- 설정/루틴 모달 스타일 --- */
        .modal-body {
            padding-top: 15px;
            overflow-y: auto;
        }
        .modal-body label {
            display: block;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
            color: #333;
        }
        .modal-body textarea {
            width: 100%;
            height: 150px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }
        .modal-body button {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .modal-body button.secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        .modal-body button.danger {
            background-color: #ff3b30;
        }
        .modal-body button:hover {
            opacity: 0.8;
        }
        #import-data-label {
            display: inline-block;
            background-color: #5856d6;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        #import-data-label:hover { opacity: 0.8; }

        /* --- 반응형 (모바일) --- */
        @media (max-width: 768px) {
            /* 1. 헤더 수정 (공통) */
            #date-header {
                flex-wrap: wrap; /* 내용이 넘치면 줄바꿈 */
                height: auto;
                padding-bottom: 5px;
            }
            #date-controls-left {
                width: 100%; 
                justify-content: space-between; 
                margin-bottom: 8px;
            }
            #center-controls {
                flex: 1; 
                justify-content: flex-start;
            }
            #search-controls-right {
                flex: 1; 
                justify-content: flex-end;
            }
            #current-date {
                font-size: 16px; /* 모바일에서 날짜 폰트 조금 축소 */
                min-width: auto;
            }
        }

        /* 2. 모바일 세로 모드: 상하 배치, 할일 8줄 */
        @media (max-width: 768px) and (orientation: portrait) {
            .main-container {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                flex: 0 0 auto; /* 내용물 크기에 맞춤 (아래 height 참고) */
                height: auto; 
            }
            .right-panel {
                width: 100%;
                flex: 1; /* 남은 공간 모두 차지 */
                min-height: 0;
            }
            /* 세로 모드에서 할일 리스트 높이 조정 (약 8줄) */
            #todo-list {
                height: 240px;
                min-height: 240px; 
            }
            #todo-section {
                min-height: 0; /* 컨테이너 제한 해제 */
            }
        }

        /* 3. 모바일 가로 모드 (또는 화면 높이가 낮을 때): 좌우 배치 */
        @media (max-width: 900px) and (orientation: landscape) {
            .main-container {
                flex-direction: row;
            }
            /* ★ Single Panel View는 가로모드에서도 상하 배치 유지 (몸무게 기록 등) */
            .main-container.single-panel-view {
                flex-direction: column;
            }

            .left-panel {
                width: 50%;
                height: 100%;
                border-right: 1px solid #e0e0e0;
                border-bottom: none;
                flex: 1;
            }
            .right-panel {
                width: 50%;
                height: 100%;
                flex: 1;
            }
            /* 높이가 부족하므로 min-height 해제하여 스크롤 유도 */
            #todo-list {
                min-height: 0; 
                flex-grow: 1;
            }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>

    <div class="app-container">
        
        <div id="date-header">
            <div id="date-controls-left">
                <button id="prev-day" aria-label="이전 날짜">-</button>
                <span id="current-date"></span>
                <button id="next-day" aria-label="다음 날짜">+</button>
                <button id="today-btn" aria-label="오늘로 이동">🎯</button>
                <button id="calendar-btn" aria-label="달력 열기">📅</button>
                <button id="memo-btn" aria-label="메모 보기">📝</button>

    <script>
        // (JS 라이브러리 로드 확인)
        window.jsPDF = window.jspdf.jsPDF;

        /* ─── 도메인 경계 (아래 순서로 구성) ───
         * HTML 요소 | 상태 변수 | 뷰 전환 | 기본 기능(설정/루틴/백업)
         * → 계획(할일/타임라인/메모) | 놀이터·몸무게 | 몸무게 시트 | 달력 | 책 리스트 | 앱 초기화
         */

        // --- HTML 요소 ---
        const newTaskInput = document.getElementById('new-task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const todoList = document.getElementById('todo-list');
        const timeline = document.getElementById('timeline');
        const dateDisplay = document.getElementById('current-date');
        const prevDayBtn = document.getElementById('prev-day');
        const nextDayBtn = document.getElementById('next-day');
        const calendarBtn = document.getElementById('calendar-btn');
        const planContainer = document.getElementById('plan-container');
        const memoBtn = document.getElementById('memo-btn');
        const memoContainer = document.getElementById('memo-container');
        const memoTextarea = document.getElementById('memo-textarea');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const searchResultsModal = document.getElementById('search-results-modal');
        const closeSearchModalBtn = document.getElementById('close-search-modal');
        const searchResultsList = document.getElementById('search-results-list');
        const playgroundBtn = document.getElementById('playground-btn');
        const playgroundContainer = document.getElementById('playground-container');
        const newGoalInput = document.getElementById('new-goal-input');
        const addGoalBtn = document.getElementById('add-goal-btn');
        const goalList = document.getElementById('goal-list');
        const goalProgressView = document.getElementById('goal-progress-view');
        const goalProgressPlaceholder = document.getElementById('goal-progress-placeholder');
        const goalProgressContent = document.getElementById('goal-progress-content');
        const goalProgressNotes = document.getElementById('goal-progress-notes');
        const goalImageUpload = document.getElementById('goal-image-upload');
        const goalProgressImages = document.getElementById('goal-progress-images');
        const exportGoalPdfBtn = document.getElementById('export-goal-pdf-btn');
        const weightBtn = document.getElementById('weight-btn');
        const graphBtn = document.getElementById('graph-btn');
        const weightContainer = document.getElementById('weight-container');
        const newWeightInput = document.getElementById('new-weight-input');
        const newAlcoholInput = document.getElementById('new-alcohol-input');
        const newContentInput = document.getElementById('new-content-input');
        const addWeightBtn = document.getElementById('add-weight-btn');
        const weightTableBody = document.getElementById('weight-table-body'); 
        
        const graphContainer = document.getElementById('graph-container');
        const graphRangeLabel = document.getElementById('graph-range-label');
        const weightChartCanvas = document.getElementById('weight-chart');
        const bookBtn = document.getElementById('book-btn');
        const bookContainer = document.getElementById('book-container');
        const bookList = document.getElementById('book-list');
        const bookNoteModal = document.getElementById('book-note-modal');
        const bookNoteTitle = document.getElementById('book-note-title');
        const bookNoteTextarea = document.getElementById('book-note-textarea');
        const saveBookNoteBtn = document.getElementById('save-book-note-btn');
        const closeBookNoteModal = document.getElementById('close-book-note-modal');
        const importBookFile = document.getElementById('import-book-file');
        const exportBookBtn = document.getElementById('export-book-btn');
        const bookSearchInput = document.getElementById('book-search-input');
        
        const todayBtn = document.getElementById('today-btn');
        const saveAllBtn = document.getElementById('save-all-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettingsModalBtn = document.getElementById('close-settings-modal');
        const settingsRoutineBtn = document.getElementById('settings-routine-btn');
        const settingsBackupBtn = document.getElementById('settings-backup-btn');
        const importDataLabel = document.getElementById('import-data-label');
        const importFileInput = document.getElementById('import-file-input');
        const settingsDeleteAllBtn = document.getElementById('settings-delete-all-btn');
        const routineModal = document.getElementById('routine-modal');
        const closeRoutineModalBtn = document.getElementById('close-routine-modal');
        const routineInput = document.getElementById('routine-input');
        const saveRoutineBtn = document.getElementById('save-routine-btn');
        const applyRoutineBtn = document.getElementById('apply-routine-btn');
        const importWeightFile = document.getElementById('import-weight-file');

        // --- 상태 변수 ---
        let draggedTaskItem = null;
        let currentDate = new Date();
        let calendarInstance = null;
        let playgroundData = { goals: [] };
        let selectedGoalId = null;
        const PLAYGROUND_KEY = 'playgroundData';
        let weightData = [];
        const WEIGHT_KEY = 'weightData';
        let chartRangeMode = 0;
        let currentChartInstance = null;
        let currentView = 'plan-container';
        const ROUTINE_KEY = 'dailyRoutines';
        const BOOK_LIST_KEY = 'bookList';
        const BOOK_NOTES_KEY = 'bookNotes';
        const BOOK_READ_STATUS_KEY = 'bookReadStatus';
        const SNU_BOOKS_KEY = 'snuBooks';
        let bookListData = [];
        let bookNotes = {};
        let bookReadStatus = {};
        let snuBooks = new Set(); // 서울대 추천도서 목록
        let currentBookId = null;

        // --- 뷰 전환 ---
        function showView(viewToShow) {
            planContainer.classList.add('hidden');
            memoContainer.classList.add('hidden');
            playgroundContainer.classList.add('hidden');
            weightContainer.classList.add('hidden');
            graphContainer.classList.add('hidden');
            bookContainer.classList.add('hidden');
            document.getElementById(viewToShow).classList.remove('hidden');
            currentView = viewToShow;
            memoBtn.textContent = '📝';
            playgroundBtn.textContent = '🏟️';
            weightBtn.style.color = '#007aff';
            graphBtn.style.color = '#007aff';
            bookBtn.style.color = '#007aff';
            if (viewToShow === 'memo-container') memoBtn.textContent = '📋';
            if (viewToShow === 'playground-container') playgroundBtn.textContent = '📋';
            if (viewToShow === 'weight-container') {
                weightBtn.style.color = '#FF9500';
                newWeightInput.placeholder = `${getDateKey(currentDate).replace(/-/g, '.')} 몸무게 (kg)`;
            }
            if (viewToShow === 'graph-container') graphBtn.style.color = '#FF9500';
            if (viewToShow === 'book-container') {
                bookBtn.style.color = '#FF9500';
                renderBookList();
            }
            
            applyRoutineBtn.style.display = (viewToShow === 'plan-container') ? 'block' : 'none';
        }
        memoBtn.addEventListener('click', () => {
            if (memoContainer.classList.contains('hidden')) showView('memo-container');
            else showView('plan-container');
        });
        playgroundBtn.addEventListener('click', () => {
            if (playgroundContainer.classList.contains('hidden')) showView('playground-container');
            else showView('plan-container');
        });
        weightBtn.addEventListener('click', () => {
            if (weightContainer.classList.contains('hidden')) showView('weight-container');
            else showView('plan-container');
        });
        
        graphBtn.addEventListener('click', () => {
            if (graphContainer.classList.contains('hidden')) {
                chartRangeMode = 0;
            } else {
                chartRangeMode = (chartRangeMode + 1) % 6;
            }
            renderWeightChart();
            showView('graph-container');
        });
        
        bookBtn.addEventListener('click', () => {
            if (bookContainer.classList.contains('hidden')) {
                showView('book-container');
            } else {
                showView('plan-container');
            }
        });
        
        // --- 기본 기능 ---
        todayBtn.addEventListener('click', () => changeDate(new Date()));
        saveAllBtn.addEventListener('click', () => {
            savePlanData();
            savePlaygroundData();
            saveWeightData();
            saveBookList();
            saveBookNotes();
            saveBookReadStatus();
            alert('저장되었습니다.');
        });
        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        closeSettingsModalBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
        settingsRoutineBtn.addEventListener('click', () => {
            const currentRoutines = JSON.parse(localStorage.getItem(ROUTINE_KEY) || '[]');
            routineInput.value = currentRoutines.join('\n');
            routineModal.classList.remove('hidden');
        });
        closeRoutineModalBtn.addEventListener('click', () => routineModal.classList.add('hidden'));
        
        saveRoutineBtn.addEventListener('click', () => {
            const newRoutines = routineInput.value.split('\n').map(r => r.trim()).filter(r => r.length > 0);
            localStorage.setItem(ROUTINE_KEY, JSON.stringify(newRoutines));
            routineModal.classList.add('hidden');
            settingsModal.classList.add('hidden');
            alert("루틴 템플릿이 저장되었습니다. '머릿속 할 일'의 🔄 버튼으로 적용/삭제하세요.");
        });
        
        applyRoutineBtn.addEventListener('click', () => {
            const currentRoutines = JSON.parse(localStorage.getItem(ROUTINE_KEY) || '[]');
            const routineItemsInList = todoList.querySelectorAll('.routine-item');

            if (routineItemsInList.length > 0) {
                if (!confirm("현재 날짜의 루틴을 목록에서 삭제하시겠습니까?")) return;
                routineItemsInList.forEach(item => {
                    item.remove();
                });
            } else {
                if (currentRoutines.length === 0) {
                    alert("설정(⚙️)에서 '매일 루틴'을 먼저 등록해주세요.");
                    return;
                }
                const existingTasks = new Set(
                    Array.from(todoList.children).map(item => item.querySelector('span').textContent)
                );
                let addedCount = 0;
                currentRoutines.slice().reverse().forEach(routineText => {
                    if (!existingTasks.has(routineText)) {
                        addNewTask(routineText, false, false, true, true); 
                        addedCount++;
                    }
                });
                if (addedCount === 0) {
                    alert("모든 루틴이 이미 목록에 있습니다.");
                }
            }
            savePlanData(); 
            checkRoutineBtnState(); 
        });

        const BACKUP_SCHEMA_VERSION = 1;
        settingsBackupBtn.addEventListener('click', () => {
            const backupData = {
                version: BACKUP_SCHEMA_VERSION,
                plans: {},
                playground: JSON.parse(localStorage.getItem(PLAYGROUND_KEY) || '{}'),
                weight: JSON.parse(localStorage.getItem(WEIGHT_KEY) || '[]'),
                routines: JSON.parse(localStorage.getItem(ROUTINE_KEY) || '[]'),
                bookList: JSON.parse(localStorage.getItem(BOOK_LIST_KEY) || '[]'),
                bookNotes: JSON.parse(localStorage.getItem(BOOK_NOTES_KEY) || '{}'),
                bookReadStatus: JSON.parse(localStorage.getItem(BOOK_READ_STATUS_KEY) || '{}'),
                snuBooks: JSON.parse(localStorage.getItem(SNU_BOOKS_KEY) || '[]')
            };
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('plan_')) {
                    backupData.plans[key] = JSON.parse(localStorage.getItem(key));
                }
            }
            const dataStr = JSON.stringify(backupData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `plan_backup_${getDateKey(new Date())}.json`;
            a.click();
            URL.revokeObjectURL(url);
            settingsModal.classList.add('hidden');
        });
        importDataLabel.addEventListener('click', () => importFileInput.click());
        importFileInput.addEventListener('change', (e) => {
            if (!e.target.files.length) return;
            if (!confirm("경고: 현재 모든 데이터를 덮어쓰고 복구합니다. 계속하시겠습니까?")) return;
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const parsedData = JSON.parse(event.target.result);
                    const version = parsedData.version ?? 0;
                    if (version > BACKUP_SCHEMA_VERSION) {
                        alert("이 백업 파일은 더 높은 버전으로 만들어졌습니다. 앱을 업데이트한 뒤 다시 시도해 주세요.");
                        return;
                    }
                    getAppStorageKeys().forEach(k => localStorage.removeItem(k));
                    localStorage.setItem(PLAYGROUND_KEY, JSON.stringify(parsedData.playground || {}));
                    localStorage.setItem(WEIGHT_KEY, JSON.stringify(parsedData.weight || []));
                    localStorage.setItem(ROUTINE_KEY, JSON.stringify(parsedData.routines || []));
                    if (parsedData.bookList !== undefined) localStorage.setItem(BOOK_LIST_KEY, JSON.stringify(parsedData.bookList));
                    if (parsedData.bookNotes !== undefined) localStorage.setItem(BOOK_NOTES_KEY, JSON.stringify(parsedData.bookNotes));
                    if (parsedData.bookReadStatus !== undefined) localStorage.setItem(BOOK_READ_STATUS_KEY, JSON.stringify(parsedData.bookReadStatus));
                    if (parsedData.snuBooks !== undefined) localStorage.setItem(SNU_BOOKS_KEY, JSON.stringify(parsedData.snuBooks));
                    if (parsedData.plans) {
                        for (const key in parsedData.plans) {
                            localStorage.setItem(key, JSON.stringify(parsedData.plans[key]));
                        }
                    }
                    alert("데이터를 성공적으로 불러왔습니다. 앱을 새로고침합니다.");
                    location.reload();
                } catch (err) {
                    alert("오류: 잘못된 백업 파일입니다.");
                }
            };
            reader.readAsText(file);
            settingsModal.classList.add('hidden');
        });
        settingsDeleteAllBtn.addEventListener('click', () => {
            if (!confirm("경고: 이 앱의 모든 데이터(계획, 목표, 몸무게)가 영구적으로 삭제됩니다. 정말 삭제하시겠습니까?")) return;
            getAppStorageKeys().forEach(k => localStorage.removeItem(k));
            alert("모든 데이터가 삭제되었습니다. 앱을 새로고침합니다.");
            location.reload();
        });


        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        function getStorageKey(date) { return `plan_${getDateKey(date)}`; }
        /** 앱 전용 localStorage 키만 반환 (같은 도메인 다른 데이터 보호용) */
        function getAppStorageKeys() {

        // 메모에서 날짜/일운 헤더 제거하고 실제 메모 내용만 반환
        function getMemoContentWithoutHeader(textContent) {
            if (!textContent) return '';
            const lines = textContent.split('\n');
            // 첫 줄이 날짜 형식인지 확인 (YYYY-MM-DD 형식 포함)
            if (lines.length > 0 && /^\d{4}-\d{2}-\d{2}/.test(lines[0].trim())) {
                return lines.slice(1).join('\n').trim();
            }
            return textContent.trim();
        }
        
        // 메모 내용에 날짜/일운 헤더 추가 (텍스트로)
        function addMemoHeader(memoContent) {
            const dateKey = getDateKey(currentDate);
            const week = ['일', '월', '화', '수', '목', '금', '토'][currentDate.getDay()];
            const dayun = getDayun(currentDate);
            const header = `${dateKey} (${week}) ${dayun.stem}${dayun.branch}`;
            if (memoContent.trim() === '') {
                return header + '\n';
            }
            return header + '\n' + memoContent;
        }
        
        function getFirstTextNode(elm) {
            if (!elm) return null;
            if (elm.nodeType === Node.TEXT_NODE) return elm;
            for (let i = 0; i < elm.childNodes.length; i++) {
                const found = getFirstTextNode(elm.childNodes[i]);
                if (found) return found;
            }
            return null;
        }
        // 메모 영역에 커서를 날짜 아래칸(두 번째 줄)에 위치시키기
        function setMemoCursor() {
            setTimeout(() => {
                const textarea = memoTextarea;
                const text = textarea.innerText || textarea.textContent || '';
                if (text.length > 0) {
                    const range = document.createRange();
                    const sel = window.getSelection();
                    
                    // 첫 줄 다음 줄 시작 위치 찾기 (첫 줄 끝의 줄바꿈 다음)
                    const firstLineEnd = text.indexOf('\n');
                    const cursorPos = firstLineEnd >= 0 ? firstLineEnd + 1 : text.length;
                    
                    // 텍스트 노드 찾기 (복붙/모바일 등으로 firstChild가 div/br일 수 있음)
                    let textNode = textarea.firstChild;
                    if (textNode && textNode.nodeType !== Node.TEXT_NODE) {
                        textNode = getFirstTextNode(textarea);
                    }
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        range.setStart(textNode, Math.min(cursorPos, textNode.length));
                        range.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                    textarea.focus();
                }
            }, 100);
        }

        // 일운(日運) 계산 함수
        function getDayun(date) {
            // 십간(十干): 甲乙丙丁戊己庚辛壬癸
            const tenStems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
            // 십이지(十二支): 子丑寅卯辰巳午未申酉戌亥
            const twelveBranches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            
            // 기준일: 2026년 1월 17일 = 신묘일 (辛卯日)
            const baseDate = new Date(2026, 0, 17); // 월은 0-based
            const baseStemIndex = 7; // 신(辛) = 7
            const baseBranchIndex = 3; // 묘(卯) = 3
            
            // 날짜 차이 계산 (밀리초를 일 단위로 변환)
            const diffTime = date.getTime() - baseDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            // 60갑자 순환 계산
            const stemIndex = (baseStemIndex + diffDays + 1000) % 10; // 음수 방지
            const branchIndex = (baseBranchIndex + diffDays + 1200) % 12; // 음수 방지
            
            return {
                stem: tenStems[stemIndex],
                branch: twelveBranches[branchIndex],
                stemIndex: stemIndex,
                branchIndex: branchIndex
            };
        }
        
        // 십간(천간)의 오행 색상 반환
        function getStemColor(stemIndex) {
            // 甲(0), 乙(1) - 木(목) - 초록
            if (stemIndex === 0 || stemIndex === 1) return '#2e7d32';
            // 丙(2), 丁(3) - 火(화) - 빨강
            if (stemIndex === 2 || stemIndex === 3) return '#d32f2f';
            // 戊(4), 己(5) - 土(토) - 노랑
            if (stemIndex === 4 || stemIndex === 5) return '#ffc107';
            // 庚(6), 辛(7) - 金(금) - 연한 회색
            if (stemIndex === 6 || stemIndex === 7) return '#bdbdbd';
            // 壬(8), 癸(9) - 水(수) - 검정
            if (stemIndex === 8 || stemIndex === 9) return '#000000';
            return '#333'; // 기본값
        }
        
        // 십이지(지지)의 오행 색상 반환
        function getBranchColor(branchIndex) {
            // 子(0), 亥(11) - 水(수) - 검정
            if (branchIndex === 0 || branchIndex === 11) return '#000000';
            // 寅(2), 卯(3) - 木(목) - 초록
            if (branchIndex === 2 || branchIndex === 3) return '#2e7d32';
            // 巳(5), 午(6) - 火(화) - 빨강
            if (branchIndex === 5 || branchIndex === 6) return '#d32f2f';
            // 辰(4), 戌(10), 丑(1), 未(7) - 土(토) - 노랑
            if (branchIndex === 4 || branchIndex === 10 || branchIndex === 1 || branchIndex === 7) return '#ffc107';
            // 申(8), 酉(9) - 金(금) - 연한 회색
            if (branchIndex === 8 || branchIndex === 9) return '#bdbdbd';
            return '#333'; // 기본값
        }
        
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const week = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
            const dayun = getDayun(date);
            const stemColor = getStemColor(dayun.stemIndex);
            const branchColor = getBranchColor(dayun.branchIndex);
            return `${year}.${month}.${day} (${week}) <span style="color: ${stemColor}; font-weight: 600;">${dayun.stem}</span><span style="color: ${branchColor}; font-weight: 600;">${dayun.branch}</span>`;
        }

        function addNewTask(taskText = null, isChecked = false, isImportant = false, isRoutine = false, isNewEntry = false) {
            let finalTaskText = taskText;
            let timeToAdd = null; // 시간표에 추가할 시간
            
            if (taskText === null) {
                finalTaskText = newTaskInput.value.trim();
                if (finalTaskText === '') return;
                
                // 입력 시 /시간 패턴 체크: /시작-끝 또는 /단일시간 (30분 단위)
                const rangeMatch = finalTaskText.match(/\/(\d{1,2})(?::\d{2})?-(\d{1,2})(?::\d{2})?$/);
                const singleMatch = !rangeMatch && finalTaskText.match(/\/(\d{1,2})$/);
                if (rangeMatch) {
                    const startHour = parseInt(rangeMatch[1], 10);
                    const endHour = parseInt(rangeMatch[2], 10);
                    const stripped = finalTaskText.substring(0, finalTaskText.lastIndexOf('/')).trim();
                    if (stripped.length === 0) {
                        alert('시간 범위를 사용하려면 작업명을 입력해주세요. (예: 회의/9-18)');
                        newTaskInput.value = '';
                        return;
                    }
                    if (startHour >= 5 && endHour <= 23 && startHour <= endHour) {
                        timeToAdd = [];
                        for (let h = startHour; h <= endHour; h++) {
                            timeToAdd.push(`${h}:00`);
                            if (h < endHour) timeToAdd.push(`${h}:30`);
                        }
                        finalTaskText = stripped;
                    }
                } else if (singleMatch) {
                    const hour = parseInt(singleMatch[1], 10);
                    const stripped = finalTaskText.substring(0, finalTaskText.lastIndexOf('/')).trim();
                    if (stripped.length === 0) {
                        alert('시간을 사용하려면 작업명을 입력해주세요. (예: 회의/14)');
                        newTaskInput.value = '';
                        return;
                    }
                    if (hour >= 5 && hour <= 23) {
                        timeToAdd = [`${hour}:00`];
                        finalTaskText = stripped;
                    }
                }
                
                // 중복 체크는 최종 작업 이름으로 확인
                const currentRoutines = JSON.parse(localStorage.getItem(ROUTINE_KEY) || '[]');
                if (currentRoutines.includes(finalTaskText) || Array.from(todoList.children).some(item => item.querySelector('span').textContent === finalTaskText)) {
                    alert("이미 목록에 있는 항목입니다.");
                    newTaskInput.value = '';
                    return;
                }
                newTaskInput.value = '';
            }
            
            const taskItem = document.createElement('li');
            taskItem.classList.add('task-item');
            if (isRoutine) taskItem.classList.add('routine-item');
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            const taskSpan = document.createElement('span');
            taskSpan.textContent = finalTaskText;
            taskSpan.contentEditable = "true";
            
            // 시간표 추가 로직을 별도 함수로 분리
            let isProcessing = false; // 중복 실행 방지 플래그
            const processTimeSlot = () => {
                if (isProcessing) return; // 이미 처리 중이면 리턴
                isProcessing = true;
                
                // contentEditable의 현재 텍스트를 가져옴
                // 여러 방법으로 텍스트 가져오기 시도
                let currentText = '';
                if (taskSpan.textContent) {
                    currentText = taskSpan.textContent.trim();
                } else if (taskSpan.innerText) {
                    currentText = taskSpan.innerText.trim();
                } else {
                    // Range API를 사용하여 텍스트 가져오기
                    const range = document.createRange();
                    range.selectNodeContents(taskSpan);
                    currentText = range.toString().trim();
                }
                
                // 슬래시 패턴 감지: /시작-끝 (예: 골프연습/9-18) 또는 /단일시간 (예: 골프연습/14)
                const rangeMatch = currentText.match(/\/(\d{1,2})(?::\d{2})?-(\d{1,2})(?::\d{2})?$/);
                const singleMatch = !rangeMatch && currentText.match(/\/(\d{1,2})$/);
                let timesToAdd = [];
                if (rangeMatch) {
                    const startHour = parseInt(rangeMatch[1], 10);
                    const endHour = parseInt(rangeMatch[2], 10);
                    if (startHour >= 5 && endHour <= 23 && startHour <= endHour) {
                        for (let h = startHour; h <= endHour; h++) {
                            timesToAdd.push(`${h}:00`);
                            if (h < endHour) timesToAdd.push(`${h}:30`);
                        }
                    }
                } else if (singleMatch) {
                    const hour = parseInt(singleMatch[1], 10);
                    if (hour >= 5 && hour <= 23) timesToAdd = [`${hour}:00`];
                }
                if (timesToAdd.length > 0) {
                    const taskName = currentText.substring(0, currentText.lastIndexOf('/')).trim();
                    if (taskName.length > 0) {
                        const isImportant = taskItem.classList.contains('is-important');
                        timesToAdd.forEach(timeStr => {
                            const timeSlot = timeline.querySelector(`[data-time="${timeStr}"]`);
                            if (timeSlot) {
                                const existingTasks = timeSlot.querySelectorAll('.dropped-task');
                                let alreadyExists = false;
                                existingTasks.forEach(task => {
                                    if (task.childNodes[0].nodeValue === taskName) alreadyExists = true;
                                });
                                if (!alreadyExists) createDroppedTaskElement(timeSlot, taskName, isImportant, false);
                            }
                        });
                        taskSpan.textContent = taskName;
                    }
                }
                savePlanData();
                isProcessing = false;
            };
            
            // blur 이벤트에서 처리 (포커스를 잃을 때)
            taskSpan.addEventListener('blur', () => {
                setTimeout(processTimeSlot, 50); // DOM 업데이트 대기
            });
            
            // Enter 키 처리
            taskSpan.addEventListener('keydown', (e) => {
                 if (e.key === 'Enter') { 
                     e.preventDefault(); 
                     // Enter 키를 눌렀을 때도 처리 (약간의 지연 후)
                     setTimeout(processTimeSlot, 50);
                 }
            });

            // 더블클릭 시 중요 표시(빨강 굵게) 토글
            taskSpan.addEventListener('dblclick', (e) => {
                 e.preventDefault();
                 taskItem.classList.toggle('is-important');
                 savePlanData();
            });
            
            // 클릭 시 바로 편집 모드로 진입 (contentEditable이므로 자동으로 가능하지만 명시적으로 포커스)
            taskSpan.addEventListener('click', (e) => {
                 // 더블클릭과 구분하기 위해 약간의 지연
                 setTimeout(() => {
                     if (document.activeElement !== taskSpan) {
                         taskSpan.focus();
                         // 커서를 텍스트 끝으로 이동
                         const range = document.createRange();
                         range.selectNodeContents(taskSpan);
                         range.collapse(false);
                         const sel = window.getSelection();
                         sel.removeAllRanges();
                         sel.addRange(range);
                     }
                 }, 0);
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');

            deleteBtn.setAttribute('aria-label', '삭제');
            
            taskItem.appendChild(checkbox);
            taskItem.appendChild(taskSpan);
            taskItem.appendChild(deleteBtn);
            
            taskItem.draggable = true;
            taskItem.addEventListener('dragstart', (e) => {
                draggedTaskItem = taskItem;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', finalTaskText);
                setTimeout(() => { taskItem.style.opacity = '0.5'; }, 0);
            });
            taskItem.addEventListener('dragend', () => {
                if (draggedTaskItem) { draggedTaskItem.style.opacity = '1'; }
                draggedTaskItem = null;
            });

            if (isRoutine) {
                deleteBtn.style.display = 'none'; 
            } else {
                deleteBtn.addEventListener('click', () => {
                    deleteTodoTask(taskText);
                });
            }

            checkbox.addEventListener('change', () => {
                taskItem.classList.toggle('completed', checkbox.checked);
                savePlanData(); 
            });

            if (isImportant) { taskItem.classList.add('is-important'); }
            if (isChecked) {
                checkbox.checked = true;
                taskItem.classList.add('completed');
            }
            
            if (isNewEntry && isRoutine) {
                todoList.prepend(taskItem);
            } else {
                todoList.appendChild(taskItem);
            }

            // 입력 시 /시간 패턴이 있었으면 시간표에도 추가
            if (timeToAdd !== null && timeToAdd.length > 0 && isNewEntry) {
                timeToAdd.forEach(timeStr => {
                    const timeSlot = timeline.querySelector(`[data-time="${timeStr}"]`);
                    if (timeSlot) {
                        const existingTasks = timeSlot.querySelectorAll('.dropped-task');
                        let alreadyExists = false;
                        existingTasks.forEach(task => {
                            if (task.childNodes[0].nodeValue === finalTaskText) alreadyExists = true;
                        });
                        if (!alreadyExists) createDroppedTaskElement(timeSlot, finalTaskText, isImportant, false);
                    }
                });
            }

            if (isNewEntry) { savePlanData(); }

        function createDroppedTaskElement(timeSlot, text, isImportant, isRoutine) {
            const droppedTask = document.createElement('div');
            droppedTask.classList.add('dropped-task');
            droppedTask.classList.toggle('is-important', isImportant);
            droppedTask.classList.toggle('is-general', !isImportant);
            
            droppedTask.appendChild(document.createTextNode(text));

            droppedTask.draggable = true;
            droppedTask.addEventListener('dragstart', (e) => {
                draggedTaskItem = droppedTask;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', text);
                setTimeout(() => { droppedTask.style.opacity = '0.5'; }, 0);
            });
            droppedTask.addEventListener('dragend', () => {
                if (draggedTaskItem) { droppedTask.style.opacity = '1'; }
                draggedTaskItem = null;
            });
            
            droppedTask.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation(); 
                timeSlot.classList.add('drag-over');
            });
            droppedTask.addEventListener('dragleave', (e) => {
                e.stopPropagation();
                timeSlot.classList.remove('drag-over');
            });
            
            // 더블클릭 시 중요 표시(빨강-검정) 토글
            droppedTask.addEventListener('dblclick', (e) => {
                e.preventDefault();
                e.stopPropagation();
                droppedTask.classList.toggle('is-important');
                droppedTask.classList.toggle('is-general');
                savePlanData();
            });
            
            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('timeline-delete-btn');
            deleteBtn.innerHTML = '&times;';
            deleteBtn.setAttribute('aria-label', '삭제');
            
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteTimelineTask(droppedTask);
            });

            droppedTask.appendChild(deleteBtn);
            timeSlot.appendChild(droppedTask);
        }
        // 드롭 리스너는 파일 전체에서 이 한 곳에만 정의 (중복 시 마지막 정의만 적용됨)
        function addDropListeners(timeSlot) {
            timeSlot.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                timeSlot.classList.add('drag-over');
            });
            timeSlot.addEventListener('dragleave', () => {
                timeSlot.classList.remove('drag-over');
            });
            timeSlot.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const targetSlot = e.target.closest('.time-slot');
                if (!targetSlot) return; 
                
                targetSlot.classList.remove('drag-over');
                if (!draggedTaskItem) return;

                // 할 일 텍스트: DOM 구조 기반 추출 (이름에 '×'가 들어가도 오작동 방지)
                let taskText = '';
                if (draggedTaskItem.classList.contains('dropped-task')) {
                    taskText = (draggedTaskItem.childNodes[0]?.nodeValue || '').trim();
                } else if (draggedTaskItem.classList.contains('task-item')) {
                    taskText = (draggedTaskItem.querySelector('span')?.textContent || '').trim();
                }
                if (taskText === '') taskText = draggedTaskItem.textContent.replace(/\s*×\s*$/, '').trim();

                if (draggedTaskItem.classList.contains('dropped-task')) {
                    draggedTaskItem.style.opacity = '1';
                    targetSlot.appendChild(draggedTaskItem);
                }
                else if (draggedTaskItem.classList.contains('task-item')) {
                    // 동일 슬롯에 같은 텍스트 태스크가 이미 있으면 중복 추가 방지
                    const existingInSlot = Array.from(targetSlot.querySelectorAll('.dropped-task'));
                    const hasSameText = existingInSlot.some(t => (t.childNodes[0]?.nodeValue || '').trim() === taskText);
                    if (hasSameText) {
                        draggedTaskItem = null;
                        savePlanData();
                        return;
                    }
                    let isImportant = false;
                    let isRoutine = false; 
                    let originalTaskItem = null;
                    
                    if (draggedTaskItem.classList.contains('task-item')) {
                        originalTaskItem = draggedTaskItem;
                    } else { 
                        originalTaskItem = Array.from(todoList.children).find(
                            item => item.querySelector('span').textContent === taskText
                        );
                    }
                    
                    if (originalTaskItem) {
                        isImportant = originalTaskItem.classList.contains('is-important');
                        isRoutine = originalTaskItem.classList.contains('routine-item');
                        
                        originalTaskItem.classList.add('completed');
                        const checkbox = originalTaskItem.querySelector('input[type="checkbox"]');
                        if (checkbox) checkbox.checked = true;
                    }

                    createDroppedTaskElement(targetSlot, taskText, isImportant, isRoutine);
                }
                draggedTaskItem = null;
                savePlanData();
            });
        }

        function renderGoalImages() {
            goalProgressImages.innerHTML = '';
            if (!selectedGoalId) return;
            const goal = playgroundData.goals.find(g => g.id === selectedGoalId);
            goal.images.forEach((imgData, index) => {
                const wrapper = document.createElement('div');

                const img = document.createElement('img');
                img.src = imgData.src;
                img.dataset.size = imgData.size;

                img.addEventListener('click', () => { cycleImageSize(index); });
                const controls = document.createElement('div');

                upBtn.innerHTML = '↑';

                const downBtn = document.createElement('button');
                downBtn.innerHTML = '↓';
                downBtn.title = '아래로';

        function moveImage(index1, index2) {
            const goal = playgroundData.goals.find(g => g.id === selectedGoalId);
            if (!goal) return;
            [goal.images[index1], goal.images[index2]] = [goal.images[index2], goal.images[index1]];

            renderGoalImages();
        }
        function deleteImage(index) {
            const goal = playgroundData.goals.find(g => g.id === selectedGoalId);
            if (!goal) return;
            goal.images.splice(index, 1);
            savePlaygroundData();
            renderGoalImages();
        }
        function cycleImageSize(index) {
            const goal = playgroundData.goals.find(g => g.id === selectedGoalId);
            if (!goal) return;
            const currentSize = goal.images[index].size;
            let newSize = '100';
            if (currentSize === '100') newSize = '75';
            else if (currentSize === '75') newSize = '50';
            else if (currentSize === '50') newSize = '100';
            goal.images[index].size = newSize;
            savePlaygroundData();
            renderGoalImages();

                goalProgressContent.removeChild(notesDiv);
                goalProgressNotes.classList.remove('hidden');
                const imgData = canvas.toDataURL('image/png');
                const doc = new jsPDF('p', 'mm', 'a4');
                const imgProps = doc.getImageProperties(imgData);
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                let heightLeft = pdfHeight;
                let position = 0;
                const pageHeight = doc.internal.pageSize.getHeight();
                doc.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                heightLeft -= pageHeight;
                while (heightLeft > 0) {
                    position = heightLeft - pdfHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pageHeight;
                }
                const goal = playgroundData.goals.find(g => g.id === selectedGoalId);
                const fileName = goal ? `goal_${goal.text.substring(0, 20)}.pdf` : 'goal-progress.pdf';
                doc.save(fileName);
            });
        });

        // --- 몸무게 시트 데이터 업데이트 ---
        function updateWeightData(dateKey, field, value) {
            const entryIndex = weightData.findIndex(e => e.date === dateKey);
            if (entryIndex === -1) return;

            let newValue = value;
            if (field === 'weight') {
                newValue = parseFloat(value);
                if (!newValue || newValue <= 0) return;
            } else if (field === 'alcohol') {
                const n = parseInt(value, 10);
                newValue = (n >= 0 && n <= 3) ? n : 0;
            } else if (field === 'content') {
                newValue = String(value || '').trim();
            }

            weightData[entryIndex][field] = newValue;
            saveWeightData();
            // renderWeightList(); // 포커스 잃음 방지를 위해 전체 리렌더링은 생략하고 데이터만 저장
        }

            if (!weight || weight <= 0) {
                alert("올바른 몸무게를 입력하세요.");
                return;
            }
            const alcoholRaw = parseInt(newAlcoholInput.value, 10);
            const alcohol = (alcoholRaw >= 0 && alcoholRaw <= 3) ? alcoholRaw : 0;
            const content = newContentInput.value.trim();
            const dateKey = getDateKey(currentDate);
            const newEntry = { date: dateKey, weight: weight, alcohol, content };
            const existingIndex = weightData.findIndex(e => e.date === dateKey);
            if (existingIndex > -1) {
                if(confirm(`이미 ${dateKey} 데이터가 있습니다. 덮어쓰시겠습니까?`)) {
                    weightData[existingIndex] = newEntry;
                } else {
                    return;
                }
            } else {
                weightData.push(newEntry);
            }
            saveWeightData();
            renderWeightList();
            newWeightInput.value = '';
            newAlcoholInput.value = '';
            newContentInput.value = '';
            newWeightInput.placeholder = `${dateKey.replace(/-/g, '.')} 몸무게 (kg)`;
        }
        function deleteWeightEntry(dateKey) {
            if(!confirm("이 기록을 삭제하시겠습니까?")) return;
            weightData = weightData.filter(e => e.date !== dateKey);
            saveWeightData();

        }
        
        function handleWeightFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const fileContent = event.target.result;
                const lines = fileContent.split('\n');
                let addedCount = 0;
                let updatedCount = 0;

                lines.forEach(line => {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length < 2) return;

                    const dateStr = parts[0];
                    const weight = parseFloat(parts[1]);
                    if (!weight || weight <= 0) return;

                    const dateParts = dateStr.split(/[.-]/);
                    if (dateParts.length !== 3) return;

                    const [year, month, day] = dateParts;
                    if (year.length !== 4 || month.length > 2 || day.length > 2) return;

                    const formattedDateKey = `${year.padStart(4, '20')}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(formattedDateKey)) return;

                    let alcohol = 0;
                    let content = '';
                    if (parts.length >= 3) {
                        const third = parseInt(parts[2], 10);
                        if (third >= 0 && third <= 3) {
                            alcohol = third;
                            content = parts.slice(3).join(' ');
                        } else {
                            content = parts.slice(2).join(' ');
                        }
                    }

                    const newEntry = { date: formattedDateKey, weight, alcohol, content };
                    const existingIndex = weightData.findIndex(e => e.date === formattedDateKey);
                    if (existingIndex > -1) {
                        weightData[existingIndex] = newEntry;
                        updatedCount++;
                    } else {
                        weightData.push(newEntry);
                        addedCount++;
                    }
                });

                saveWeightData();
                renderWeightList();
                alert(`데이터 불러오기 완료: ${addedCount}개 추가, ${updatedCount}개 업데이트`);
                importWeightFile.value = '';
            };
            reader.readAsText(file);
        }

        function renderWeightChart() {
            if (currentChartInstance) {
                currentChartInstance.destroy();
            }
            const rangeLabels = ['1개월', '3개월', '6개월', '1년', '5년', '10년'];
            const rangeMonths = [1, 3, 6, 12, 60, 120];
            
            graphRangeLabel.textContent = rangeLabels[chartRangeMode];
            
            const cutoff = new Date();
            cutoff.setMonth(cutoff.getMonth() - rangeMonths[chartRangeMode]);
            cutoff.setHours(0, 0, 0, 0);

            const today = new Date();
            const labels = [];
            const dataPoints = [];
            const pointColors = [];
            const fullDateLabels = [];
            
            const weightMap = new Map();
            weightData.forEach(entry => {
                weightMap.set(entry.date, entry);
            });

            let currentDay = new Date(cutoff);
            while (currentDay <= today) {
                const dateKey = getDateKey(currentDay);
                
                // ★ 2. 그래프 x축 라벨 수정 (YYYY.MM.DD)
                const y = currentDay.getFullYear();
                const m = String(currentDay.getMonth() + 1).padStart(2, '0');
                const d = String(currentDay.getDate()).padStart(2, '0');
                labels.push(`${y}.${m}.${d}`);
                fullDateLabels.push(`${y}.${m}.${d}`);

                if (weightMap.has(dateKey)) {
                    const entry = weightMap.get(dateKey);
                    dataPoints.push(entry.weight);
                    const alc = entry.alcohol ?? 0;
                    const colors = ['transparent', '#ffffff', '#ffeb3b', '#ff3b30'];
                    pointColors.push(colors[alc] ?? 'transparent');
                } else {
                    dataPoints.push(null);
                    pointColors.push('#007aff');
                }
                
                currentDay.setDate(currentDay.getDate() + 1);
            }
            
            const ctx = weightChartCanvas.getContext('2d');
            currentChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '몸무게 (kg)',
                        data: dataPoints,
                        borderColor: '#007aff',
                        backgroundColor: 'rgba(0,122,255,0.1)',
                        fill: true,
                        tension: 0.1,
                        pointRadius: 4,
                        pointBackgroundColor: pointColors, // ★ 2. 개별 점 색상 적용
                        spanGaps: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    const dataIndex = context[0].dataIndex;
                                    return fullDateLabels[dataIndex];
                                },
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.parsed.y} kg`;
                                }
                            }
                        }
                    }
                }
            });
        }
