        function restoreSnuBooks() {
            const snuBooksList = getSnuBooksList();
            snuBooks.clear();
            
            // 서울대 추천도서 목록 저장
            snuBooksList.forEach(categoryData => {
                categoryData.books.forEach(bookTitle => {
                    snuBooks.add(getBookId(categoryData.category, bookTitle));
                });
            });
            localStorage.setItem(SNU_BOOKS_KEY, JSON.stringify(Array.from(snuBooks)));
            
            // 현재 bookListData에 서울대 추천도서가 누락되었는지 확인하고 복구
            snuBooksList.forEach(snuCategory => {
                const existingCategory = bookListData.find(c => c.category === snuCategory.category);
                if (existingCategory) {
                    // 기존 카테고리가 있으면 서울대 추천도서가 빠진 것만 추가
                    snuCategory.books.forEach(snuBook => {
                        if (!existingCategory.books.includes(snuBook)) {
                            existingCategory.books.push(snuBook);
                        }
                    });
                } else {
                    // 카테고리 자체가 없으면 추가 (배열 복사 방어)
                    const books = Array.isArray(snuCategory.books) ? [...snuCategory.books] : [];
                    bookListData.push({ category: snuCategory.category, books });
                }
            });
            
            saveBookList();
        }
        
        function initializeBookList() {
            const savedList = localStorage.getItem(BOOK_LIST_KEY);
            if (savedList) {
                bookListData = JSON.parse(savedList);
            } else {
                // 서울대 추천도서 100선 초기 데이터
                const snuBooksList = getSnuBooksList();
                bookListData = snuBooksList;
                saveBookList();
            }
            
            // 서울대 추천도서 목록 불러오기 및 복구
            const savedSnuBooks = localStorage.getItem(SNU_BOOKS_KEY);
            if (savedSnuBooks) {
                snuBooks = new Set(JSON.parse(savedSnuBooks));
            } else {
                // 저장된 목록이 없으면 초기화
                restoreSnuBooks();
            }
            
            // 서울대 추천도서가 누락되었는지 확인하고 복구
            const snuBooksList = getSnuBooksList();
            let needsRestore = false;
            snuBooksList.forEach(snuCategory => {
                snuCategory.books.forEach(snuBook => {
                    const bookId = getBookId(snuCategory.category, snuBook);
                    if (!snuBooks.has(bookId)) {
                        needsRestore = true;
                    }
                });
            });
            
            if (needsRestore) {
                restoreSnuBooks();
            }
            
            const savedNotes = localStorage.getItem(BOOK_NOTES_KEY);
            if (savedNotes) {
                bookNotes = JSON.parse(savedNotes);
            }
            
            const savedReadStatus = localStorage.getItem(BOOK_READ_STATUS_KEY);
            if (savedReadStatus) {
                bookReadStatus = JSON.parse(savedReadStatus);
            }
        }
        
        function saveBookList() {
            localStorage.setItem(BOOK_LIST_KEY, JSON.stringify(bookListData));
        }
        
        function saveBookNotes() {
            localStorage.setItem(BOOK_NOTES_KEY, JSON.stringify(bookNotes));
        }
        
        function saveBookReadStatus() {
            localStorage.setItem(BOOK_READ_STATUS_KEY, JSON.stringify(bookReadStatus));
        }
        
        function getBookId(category, bookTitle) {
            return `${category}_${bookTitle}`;
        }
        
        let currentBookSearchQuery = '';
        
        function renderBookList() {
            bookList.innerHTML = '';
            const searchQuery = currentBookSearchQuery.toLowerCase().trim();
            
            bookListData.forEach(categoryData => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'book-category';
                
                const categoryHeader = document.createElement('div');
                categoryHeader.style.display = 'flex';
                categoryHeader.style.justifyContent = 'space-between';
                categoryHeader.style.alignItems = 'center';
                categoryHeader.style.marginBottom = '10px';
                
                const categoryTitle = document.createElement('div');
                categoryTitle.className = 'book-category-title';
                categoryTitle.textContent = categoryData.category;
                categoryTitle.style.marginBottom = '0';
                categoryTitle.style.borderBottom = 'none';
                categoryTitle.style.paddingBottom = '0';
                
                const addBookBtn = document.createElement('button');
                addBookBtn.textContent = '+ 도서 추가';
                addBookBtn.style.cssText = 'background-color: #34c759; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: 600;';
                addBookBtn.addEventListener('click', () => {
                    const categoryIndex = bookListData.findIndex(c => c.category === categoryData.category);
                    bookListData[categoryIndex].books.push('');
                    saveBookList();
                    renderBookList();
                    // 새로 추가된 항목에 포커스
                    setTimeout(() => {
                        const newItems = categoryDiv.querySelectorAll('.book-item-title');
                        if (newItems.length > 0) {
                            const lastItem = newItems[newItems.length - 1];
                            lastItem.focus();
                            const range = document.createRange();
                            range.selectNodeContents(lastItem);
                            range.collapse(false);
                            const sel = window.getSelection();
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }, 50);
                });
                
                categoryHeader.appendChild(categoryTitle);
                categoryHeader.appendChild(addBookBtn);
                categoryDiv.appendChild(categoryHeader);
                
                categoryData.books.forEach((bookTitle, index) => {
                    // 검색 필터링
                    let shouldShow = true;
                    if (searchQuery) {
                        const titleLower = bookTitle.toLowerCase();
                        // 제목 또는 저자 검색 (| 기호로 구분된 경우 저자 부분도 검색)
                        const parts = bookTitle.split('|');
                        const titlePart = parts[0].trim().toLowerCase();
                        const authorPart = parts.length > 1 ? parts[1].trim().toLowerCase() : '';
                        shouldShow = titleLower.includes(searchQuery) || 
                                    titlePart.includes(searchQuery) || 
                                    authorPart.includes(searchQuery);
                    }
                    
                    const bookItem = document.createElement('div');
                    bookItem.className = 'book-item';
                    if (!shouldShow) {
                        bookItem.classList.add('hidden');
                    }
                    const bookId = getBookId(categoryData.category, bookTitle);
                    
                    if (bookNotes[bookId]) {
                        bookItem.classList.add('has-note');
                    }
                    
                    if (bookReadStatus[bookId]) {
                        bookItem.classList.add('completed');
                    }
                    
                    // 체크박스
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = bookReadStatus[bookId] || false;
                    checkbox.style.marginRight = '8px';
                    checkbox.style.accentColor = '#007aff';
                    checkbox.addEventListener('click', (e) => {
                        e.stopPropagation();
                        bookReadStatus[bookId] = checkbox.checked;
                        saveBookReadStatus();
                        bookItem.classList.toggle('completed', checkbox.checked);
                    });
                    
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'book-item-number';
                    numberSpan.textContent = `${index + 1}.`;
                    
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'book-item-title';
                    titleSpan.contentEditable = 'true';
                    titleSpan.textContent = bookTitle;
                    
                    // 서울대 추천도서인지 확인
                    if (snuBooks.has(bookId)) {
                        titleSpan.classList.add('snu-book');
                    }
                    
                    // 엔터 키 처리 (모든 도서에서 엔터 시 다음 항목으로 이동 또는 새 항목 추가)
                    titleSpan.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            const newTitle = titleSpan.textContent.trim();
                            const categoryIndex = bookListData.findIndex(c => c.category === categoryData.category);
                            
                            // 현재 항목 업데이트
                            if (newTitle && newTitle !== bookTitle) {
                                bookListData[categoryIndex].books[index] = newTitle;
                                saveBookList();
                            }
                            
                            // 마지막 도서인 경우 새 항목 추가
                            const isLastBook = index === categoryData.books.length - 1;
                            if (isLastBook) {
                                bookListData[categoryIndex].books.push('');
                                saveBookList();
                                renderBookList();
                                // 새로 추가된 항목에 포커스
                                setTimeout(() => {
                                    const newItems = categoryDiv.querySelectorAll('.book-item-title');
                                    if (newItems.length > 0) {
                                        const lastItem = newItems[newItems.length - 1];
                                        lastItem.focus();
                                        const range = document.createRange();
                                        range.selectNodeContents(lastItem);
                                        range.collapse(false);
                                        const sel = window.getSelection();
                                        sel.removeAllRanges();
                                        sel.addRange(range);
                                    }
                                }, 50);
                            } else {
                                // 다음 항목으로 포커스 이동
                                titleSpan.blur();
                                setTimeout(() => {
                                    const nextItem = categoryDiv.querySelectorAll('.book-item-title')[index + 1];
                                    if (nextItem) {
                                        nextItem.focus();
                                        const range = document.createRange();
                                        range.selectNodeContents(nextItem);
                                        range.collapse(false);
                                        const sel = window.getSelection();
                                        sel.removeAllRanges();
                                        sel.addRange(range);
                                    }
                                }, 50);
                            }
                        }
                    });
                    
                    titleSpan.addEventListener('blur', () => {
                        const newTitle = titleSpan.textContent.trim();
                        if (newTitle && newTitle !== bookTitle) {
                            const categoryIndex = bookListData.findIndex(c => c.category === categoryData.category);
                            const oldBookId = getBookId(categoryData.category, bookTitle);
                            const newBookId = getBookId(categoryData.category, newTitle);
                            
                            // 노트와 읽기 상태 이전
                            if (bookNotes[oldBookId]) {
                                bookNotes[newBookId] = bookNotes[oldBookId];
                                delete bookNotes[oldBookId];
                                saveBookNotes();
                            }
                            if (bookReadStatus[oldBookId] !== undefined) {
                                bookReadStatus[newBookId] = bookReadStatus[oldBookId];
                                delete bookReadStatus[oldBookId];
                                saveBookReadStatus();
                            }
                            
                            bookListData[categoryIndex].books[index] = newTitle;
                            saveBookList();
                        } else if (!newTitle) {
                            // 빈 제목이면 원래 제목으로 복구
                            titleSpan.textContent = bookTitle;
                        }
                    });
                    
                    bookItem.appendChild(checkbox);
                    bookItem.appendChild(numberSpan);
                    bookItem.appendChild(titleSpan);
                    
                    // 서울대 추천도서는 삭제 버튼을 생성하지 않음
                    const isSnuBook = snuBooks.has(bookId);
                    if (!isSnuBook) {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'book-item-delete';
                        deleteBtn.innerHTML = '&times;';
                        deleteBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (confirm(`"${bookTitle}"을(를) 리스트에서 삭제하시겠습니까?`)) {
                                const categoryIndex = bookListData.findIndex(c => c.category === categoryData.category);
                                bookListData[categoryIndex].books = bookListData[categoryIndex].books.filter(b => b !== bookTitle);
                                // 노트와 읽기 상태도 삭제
                                delete bookNotes[bookId];
                                delete bookReadStatus[bookId];
                                saveBookNotes();
                                saveBookReadStatus();
                                saveBookList();
                                renderBookList();
                            }
                        });
                        bookItem.appendChild(deleteBtn);
                    }
                    
                    // 제목 더블클릭 시 독서노트 열기
                    titleSpan.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        openBookNote(categoryData.category, titleSpan.textContent.trim() || bookTitle);
                    });
                    
                    categoryDiv.appendChild(bookItem);
                });
                
                bookList.appendChild(categoryDiv);
            });
        }

                            word-wrap: break-word;
                            font-size: 14px;
                            line-height: 1.8;
                        }
                        @media print {
                            body { padding: 20px; }
                        }
                    </style>
                </head>
                <body>
                    <h1>${bookTitle}</h1>
                    <div class="note-content">${noteContent.replace(/\n/g, '<br>')}</div>
                </body>
                </html>
            `);
            printWindow.document.close();
            setTimeout(() => {
                printWindow.print();
            }, 250);
        });
        
        // 책 검색 기능
        function performBookSearch() {
            currentBookSearchQuery = bookSearchInput.value;
            renderBookList();
        }
        
        bookSearchInput.addEventListener('input', performBookSearch);
        bookSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performBookSearch();
            }
        });
        
        // 엑셀 내보내기
        exportBookBtn.addEventListener('click', () => {
            let csvContent = '카테고리,번호,책제목\n';
            bookListData.forEach(categoryData => {
                categoryData.books.forEach((bookTitle, index) => {
                    csvContent += `"${categoryData.category}",${index + 1},"${bookTitle}"\n`;
                });
            });
            
            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `서울대_추천도서_${getDateKey(new Date())}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });
        
        // 엑셀 불러오기
        importBookFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const text = event.target.result;
                    const lines = text.split('\n').filter(line => line.trim());
                    
                    // CSV 헤더 제거
                    if (lines[0].includes('카테고리')) {
                        lines.shift();
                    }
                    
                    const newBookListData = [];
                    const categoryMap = {};
                    
                    lines.forEach(line => {
                        // CSV 파싱 (쉼표로 분리, 따옴표 처리)
                        const matches = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                        if (!matches || matches.length < 3) return;
                        
                        const category = matches[0].replace(/^"|"$/g, '').trim();
                        const bookTitle = matches[2].replace(/^"|"$/g, '').trim();
                        
                        if (!category || !bookTitle) return;
                        
                        if (!categoryMap[category]) {
                            categoryMap[category] = [];
                            newBookListData.push({ category, books: categoryMap[category] });
                        }
                        
                        if (!categoryMap[category].includes(bookTitle)) {
                            categoryMap[category].push(bookTitle);
                        }
                    });
                    
                    if (newBookListData.length === 0) {
                        alert('올바른 형식의 CSV 파일이 아닙니다.');
                        return;
                    }
                    
                    if (confirm('기존 책 리스트를 불러온 파일로 교체하시겠습니까?')) {
                        bookListData = newBookListData;
                        saveBookList();
                        renderBookList();
                        alert('책 리스트를 불러왔습니다.');
                    }
                } catch (err) {
                    alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
                }
            };
            
            if (file.name.endsWith('.csv')) {
                reader.readAsText(file, 'UTF-8');
            } else {
                alert('CSV 파일만 지원합니다. 엑셀 파일은 CSV 형식으로 저장한 후 불러오세요.');
            }
            
            importBookFile.value = '';
        });

        // --- 앱 초기화 ---
        function initializeApp() {
            createTimeline();
            updateDateDisplay();
            initializeCalendar();
            loadPlanData();
            loadPlaygroundData();
            addGoalBtn.addEventListener('click', addNewGoal);
            newGoalInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addNewGoal();
            });
            loadWeightData();
            addWeightBtn.addEventListener('click', addNewWeight);
            [newWeightInput, newAlcoholInput, newContentInput].forEach(inp => {
                inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewWeight(); });
            });
            
            importWeightFile.addEventListener('change', handleWeightFileImport);
            
            initializeBookList();
            
            searchResultsModal.classList.add('hidden');
            settingsModal.classList.add('hidden');
            routineModal.classList.add('hidden');
            bookNoteModal.classList.add('hidden');
        }

        initializeApp();

    </script>
</body>
</html>
